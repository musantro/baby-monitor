<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Monitor</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link id="app-manifest" rel="manifest" href="/manifest.json" />
  <script>
    if ((navigator.languages?.length ? navigator.languages : [navigator.language]).some(language => language?.toLowerCase().startsWith("es"))) {
      document.querySelector("#app-manifest").href = "/manifest.es-ES.json";
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>

</html>
